apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: project-02-k8s-app
data:
  DATABASE_HOST: "db-registry-0.mysql-service"
  DATABASE_NAME: "lab-db"
  DATABASE_USER: "job"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: project-02-k8s-app
type: Opaque
stringData:
  DATABASE_PASSWORD: "password123"
  DATABASE_ROOT_PASSWORD: "root"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
  namespace: project-02-k8s-app
data:
  init.sql: |
    -- 1. Create the database if it doesn't exist
    CREATE DATABASE IF NOT EXISTS `lab-db`;
    USE `lab-db`;

    -- 2. Create the remote user and explicitly grant permissions
    CREATE USER IF NOT EXISTS 'job'@'%' IDENTIFIED BY 'password123';
    GRANT ALL PRIVILEGES ON `lab-db`.* TO 'job'@'%';
    FLUSH PRIVILEGES;

    -- 3. Create the profile target table matching the new app layout
    CREATE TABLE IF NOT EXISTS lab_table (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        occupation VARCHAR(100) NOT NULL,
        title VARCHAR(100) NOT NULL,
        worker_node VARCHAR(100) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
