apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: registry
  name: registry
  namespace: project-02-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registry
  strategy: {}
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - image: fasilcv/devapp:v1.0.0
        name: devapp
        env:
        - name: DATABASE_HOST
          value: "db-registry-0.mysql-service"
        - name: DATABASE_NAME
          value: "lab-db"
        - name: DATABASE_USER
          value: "job"
        - name: DATABASE_PASSWORD
          value: "password123"
        ports:
        - containerPort: 80
        resources: {}
status: {}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: registry
  name: svc-registry
  namespace: project-02-k8s-app
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 80
  selector:
    app: registry
status:
  loadBalancer: {}
