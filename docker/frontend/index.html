<!DOCTYPE html>
<html>
<head>
  <title>Kubernetes MySQL Demo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1f3a, #123a6b);
      color: white;
      text-align: center;
    }

    .header {
      padding: 40px;
      background: #0d2a52;
    }

    .btn {
      padding: 12px 20px;
      background: #2d7dff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 20px;
    }

    .box {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>☸️ Kubernetes + MySQL Demo</h1>
  <p>Frontend → Backend → Database</p>

  <button class="btn" onclick="loadUsers()">
    Load Data from Database
  </button>
</div>

<div class="box" id="status">
  Status: Not connected
</div>

<div class="box">
  <h3>Users</h3>
  <table id="usersTable"></table>
</div>

<script>
function loadUsers() {
  fetch("http://backend:5000/users")
    .then(res => res.json())
    .then(data => {

      document.getElementById("status").innerHTML =
        "✅ Connection Successful";

      let table = "<tr><th>ID</th><th>Name</th></tr>";

      data.forEach(u => {
        table += `<tr><td>${u.id}</td><td>${u.name}</td></tr>`;
      });

      document.getElementById("usersTable").innerHTML = table;
    })
    .catch(err => {
      document.getElementById("status").innerHTML =
        "❌ Connection Failed";
    });
}
</script>

</body>
</html>
